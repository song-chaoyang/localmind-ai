<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" width="780" height="420">
  <defs>
    <linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/><stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="ag2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="ag3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/><stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="ag4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/><stop offset="100%" style="stop-color:#f79862"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="420" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f0f6fc">🤝 Multi-Agent Collaboration</text>

  <!-- Central hub -->
  <circle cx="390" cy="210" r="45" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#glow)"/>
  <text x="390" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20">🧠</text>
  <text x="390" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#58a6ff" font-weight="bold">LocalMind</text>

  <!-- Connection lines with animated flow -->
  <g stroke-width="2" fill="none">
    <path d="M345,175 Q250,120 170,140" stroke="#1f6feb" stroke-dasharray="5,5" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M435,175 Q530,120 610,140" stroke="#238636" stroke-dasharray="5,5" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M345,245 Q250,300 170,280" stroke="#8957e5" stroke-dasharray="5,5" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M435,245 Q530,300 610,280" stroke="#f0883e" stroke-dasharray="5,5" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Cross connections -->
    <path d="M210,180 Q390,130 570,180" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <path d="M210,300 Q390,350 570,300" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Agent: Researcher -->
  <g filter="url(#glow)">
    <rect x="70" y="110" width="180" height="80" rx="12" fill="#0d1117" stroke="url(#ag1)" stroke-width="2"/>
    <text x="160" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22">🔍</text>
    <text x="160" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#58a6ff" font-weight="bold">Researcher</text>
    <text x="160" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Web search · Analysis</text>
  </g>

  <!-- Agent: Coder -->
  <g filter="url(#glow)">
    <rect x="530" y="110" width="180" height="80" rx="12" fill="#0d1117" stroke="url(#ag2)" stroke-width="2"/>
    <text x="620" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22">👨‍💻</text>
    <text x="620" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#3fb950" font-weight="bold">Coder</text>
    <text x="620" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Generate · Debug · Review</text>
  </g>

  <!-- Agent: Analyst -->
  <g filter="url(#glow)">
    <rect x="70" y="250" width="180" height="80" rx="12" fill="#0d1117" stroke="url(#ag3)" stroke-width="2"/>
    <text x="160" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22">📊</text>
    <text x="160" y="302" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a371f7" font-weight="bold">Analyst</text>
    <text x="160" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Process · Visualize</text>
  </g>

  <!-- Agent: Writer -->
  <g filter="url(#glow)">
    <rect x="530" y="250" width="180" height="80" rx="12" fill="#0d1117" stroke="url(#ag4)" stroke-width="2"/>
    <text x="620" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22">✍️</text>
    <text x="620" y="302" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#f79862" font-weight="bold">Writer</text>
    <text x="620" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">Draft · Edit · Translate</text>
  </g>

  <!-- Workflow steps at bottom -->
  <g font-family="system-ui,sans-serif" font-size="11">
    <rect x="120" y="370" width="540" height="36" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="145" y="393" fill="#8b949e">Step 1:</text>
    <text x="195" y="393" fill="#58a6ff">Research</text>
    <text x="265" y="393" fill="#484f58">→</text>
    <text x="285" y="393" fill="#8b949e">Step 2:</text>
    <text x="335" y="393" fill="#3fb950">Code</text>
    <text x="375" y="393" fill="#484f58">→</text>
    <text x="395" y="393" fill="#8b949e">Step 3:</text>
    <text x="445" y="393" fill="#a371f7">Analyze</text>
    <text x="500" y="393" fill="#484f58">→</text>
    <text x="520" y="393" fill="#8b949e">Step 4:</text>
    <text x="570" y="393" fill="#f79862">Write Report</text>
  </g>
</svg>