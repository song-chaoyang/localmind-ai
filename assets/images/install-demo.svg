  <text x="110" y="465" fill="#38bdf8" font-size="28" font-family="JetBrains Mono,Consolas,monospace">🌐 Web UI: http://localhost:3000</text>

  <rect x="100" y="525" width="1000" height="72" rx="12" fill="#1e293b" stroke="#475569"/>
  <text x="600" y="570" text-anchor="middle" fill="#e2e8f0" font-size="28" font-family="Inter,Segoe UI,sans-serif">Ready to chat. Persistent memory enabled.</text>
