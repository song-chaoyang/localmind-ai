<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" width="780" height="350">
  <defs>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="780" height="350" rx="10" fill="#0a0e14"/>
  <rect width="780" height="350" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="780" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="780" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="390" y="24" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash - 80x24</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace" font-size="13">
    <!-- Command 1: pip install -->
    <text x="20" y="65" fill="#3fb950">$</text>
    <text x="35" y="65" fill="#f0f6fc"> pip install openmind</text>

    <!-- Install output -->
    <text x="20" y="88" fill="#8b949e">Collecting openmind</text>
    <text x="20" y="108" fill="#8b949e">  Downloading openmind-2.1.0-py3-none-any.whl (12.4 MB)</text>
    <text x="20" y="128" fill="#8b949e">Installing collected packages: openmind</text>
    <text x="20" y="148" fill="#3fb950">Successfully installed openmind-2.1.0</text>

    <!-- Command 2: run -->
    <text x="20" y="178" fill="#3fb950">$</text>
    <text x="35" y="178" fill="#f0f6fc"> openmind --model llama3</text>

    <!-- Model download -->
    <text x="20" y="201" fill="#8b949e">Downloading model: meta-llama/Llama-3-8B-Instruct</text>

    <!-- Progress bar -->
    <rect x="20" y="213" width="500" height="14" rx="3" fill="#21262d"/>
    <rect x="20" y="213" width="475" height="14" rx="3" fill="url(#progressGrad)"/>
    <text x="270" y="224" font-size="10" fill="#0d1117" text-anchor="middle" font-weight="bold">95% | 4.28 GB / 4.50 GB</text>

    <!-- Loading model -->
    <text x="20" y="248" fill="#8b949e">Loading model into memory...</text>
    <text x="20" y="268" fill="#8b949e">Initializing RAG engine...</text>
    <text x="20" y="288" fill="#8b949e">Starting web server...</text>

    <!-- Success -->
    <text x="20" y="318" fill="#3fb950" font-size="14" font-weight="bold">&#10003; OpenMind is running at </text>
    <text x="310" y="318" fill="#58a6ff" font-size="14" font-weight="bold" text-decoration="underline">http://localhost:3000</text>

    <!-- Blinking cursor -->
    <rect x="20" y="332" width="8" height="16" fill="#f0f6fc">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>