<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111a33"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="24" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="560" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <rect x="70" y="70" width="1060" height="56" rx="18" fill="#111827"/>
  <circle cx="105" cy="98" r="8" fill="#ef4444"/>
  <circle cx="133" cy="98" r="8" fill="#f59e0b"/>
  <circle cx="161" cy="98" r="8" fill="#22c55e"/>
  <text x="600" y="104" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="Inter,Segoe UI,sans-serif">NexusMind Quick Start</text>

  <text x="110" y="180" fill="#cbd5e1" font-size="30" font-family="JetBrains Mono,Consolas,monospace">$ pip install nexusmind</text>
