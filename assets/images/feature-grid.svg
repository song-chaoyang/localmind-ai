<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="featGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="card1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card5Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="card6Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowHover">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes glowPulse { 0%,100%{filter:drop-shadow(0 0 0px transparent)} 50%{filter:drop-shadow(0 0 12px rgba(99,102,241,0.3))} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .card{animation:fadeIn 0.6s ease-out both}
    .card1{animation-delay:0.1s}
    .card2{animation-delay:0.2s}
    .card3{animation-delay:0.3s}
    .card4{animation-delay:0.4s}
    .card5{animation-delay:0.5s}
    .card6{animation-delay:0.6s}
    .glow-hint{animation:glowPulse 3s ease-in-out infinite}
  </style>
  <rect width="900" height="600" fill="#0f0f23" rx="12"/>
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="url(#featGrad)">Features</text>
  <line x1="370" y1="58" x2="530" y2="58" stroke="url(#featGrad)" stroke-width="2" opacity="0.4"/>
  <!-- Row 1 -->
  <!-- Card 1: Persistent Memory -->
  <g class="card card1 glow-hint" filter="url(#cardShadow)">
    <rect x="40" y="80" width="260" height="160" rx="16" fill="url(#card1Grad)" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="170" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x1F9E0;</text>
  <text x="170" y="160" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Persistent Memory</text>
  <text x="170" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#a5b4fc">Never explain your</text>
  <text x="170" y="202" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#a5b4fc">project twice</text>
  <!-- Decorative dots -->
  <circle cx="60" cy="100" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="70" cy="110" r="1.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="55" cy="115" r="1" fill="#6366f1" opacity="0.2"/>
  <!-- Card 2: Auto Skill Evolution -->
  <g class="card card2 glow-hint" style="animation-delay:0.8s" filter="url(#cardShadow)">
    <rect x="320" y="80" width="260" height="160" rx="16" fill="url(#card2Grad)" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x26A1;</text>
  <text x="450" y="160" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Auto Skill Evolution</text>
  <text x="450" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#c4b5fd">Learns from every</text>
  <text x="450" y="202" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#c4b5fd">interaction</text>
  <circle cx="340" cy="100" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="350" cy="110" r="1.5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="335" cy="115" r="1" fill="#7c3aed" opacity="0.2"/>
  <!-- Card 3: Sleep Mode Agent -->
  <g class="card card3 glow-hint" style="animation-delay:1.6s" filter="url(#cardShadow)">
    <rect x="600" y="80" width="260" height="160" rx="16" fill="url(#card3Grad)" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="730" y="125" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x1F319;</text>
  <text x="730" y="160" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Sleep Mode Agent</text>
  <text x="730" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#d8b4fe">Works while</text>
  <text x="730" y="202" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#d8b4fe">you sleep</text>
  <circle cx="620" cy="100" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="630" cy="110" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="615" cy="115" r="1" fill="#8b5cf6" opacity="0.2"/>
  <!-- Row 2 -->
  <!-- Card 4: Multi-Agent -->
  <g class="card card4 glow-hint" style="animation-delay:2.4s" filter="url(#cardShadow)">
    <rect x="40" y="270" width="260" height="160" rx="16" fill="url(#card4Grad)" stroke="#a855f7" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="170" y="315" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x1F916;</text>
  <text x="170" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Multi-Agent</text>
  <text x="170" y="375" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e9d5ff">Specialized agents</text>
  <text x="170" y="392" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#e9d5ff">collaborate</text>
  <circle cx="60" cy="290" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="70" cy="300" r="1.5" fill="#a855f7" opacity="0.3"/>
  <circle cx="55" cy="305" r="1" fill="#a855f7" opacity="0.2"/>
  <!-- Card 5: Multi-Provider -->
  <g class="card card5 glow-hint" style="animation-delay:3.2s" filter="url(#cardShadow)">
    <rect x="320" y="270" width="260" height="160" rx="16" fill="url(#card5Grad)" stroke="#9333ea" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="450" y="315" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x1F517;</text>
  <text x="450" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Multi-Provider</text>
  <text x="450" y="375" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#f5d0fe">OpenAI, Claude,</text>
  <text x="450" y="392" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#f5d0fe">Ollama, and more</text>
  <circle cx="340" cy="290" r="2" fill="#9333ea" opacity="0.4"/>
  <circle cx="350" cy="300" r="1.5" fill="#9333ea" opacity="0.3"/>
  <circle cx="335" cy="305" r="1" fill="#9333ea" opacity="0.2"/>
  <!-- Card 6: Self-Hosted -->
  <g class="card card6 glow-hint" style="animation-delay:4.0s" filter="url(#cardShadow)">
    <rect x="600" y="270" width="260" height="160" rx="16" fill="url(#card6Grad)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3"/>
  </g>
  <text x="730" y="315" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36">&#x1F4E6;</text>
  <text x="730" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#e0e7ff">Self-Hosted</text>
  <text x="730" y="375" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#f0abfc">Your data,</text>
  <text x="730" y="392" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#f0abfc">your rules</text>
  <circle cx="620" cy="290" r="2" fill="#c084fc" opacity="0.4"/>
  <circle cx="630" cy="300" r="1.5" fill="#c084fc" opacity="0.3"/>
  <circle cx="615" cy="305" r="1" fill="#c084fc" opacity="0.2"/>
  <!-- Bottom tagline -->
  <rect x="200" y="470" width="500" height="50" rx="25" fill="#1e1b4b" stroke="#312e81" stroke-width="1" opacity="0.8"/>
  <text x="450" y="500" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#a5b4fc">Open Source &bull; Self-Hosted &bull; Privacy First &bull; Always Evolving</text>
  <!-- Subtle background particles -->
  <circle cx="100" cy="560" r="1" fill="#6366f1" opacity="0.3"/>
  <circle cx="250" cy="550" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="400" cy="565" r="1" fill="#a855f7" opacity="0.25"/>
  <circle cx="550" cy="555" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="700" cy="560" r="1" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="800" cy="550" r="1.5" fill="#a855f7" opacity="0.2"/>
</svg>