<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <defs>
    <linearGradient id="titlebar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d333b"/>
      <stop offset="100%" style="stop-color:#22272e"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="780" height="520" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="780" height="38" rx="12" fill="url(#titlebar)"/>
  <rect y="26" width="780" height="12" fill="url(#titlebar)"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="390" y="24" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b949e">localmind — bash — 80×24</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono','Cascadia Code',monospace" font-size="13" transform="translate(20, 60)">
    <!-- Command 1: Install -->
    <text y="0" fill="#8b949e">$</text>
    <text x="18" y="0" fill="#79c0ff">pip install</text>
    <text x="118" y="0" fill="#c9d1d9">localmind</text>

    <text y="24" fill="#3fb950">✅ Successfully installed localmind-0.1.0</text>

    <!-- Command 2: Start -->
    <text y="56" fill="#8b949e">$</text>
    <text x="18" y="56" fill="#79c0ff">localmind</text>
    <text x="100" y="56" fill="#c9d1d9">start --model llama3</text>

    <text y="80" fill="#58a6ff">🧠 LocalMind v0.1.0 — Your Private AI Operating System</text>
    <text y="100" fill="#8b949e">   Loading model 'llama3' via ollama...</text>
    <text y="120" fill="#3fb950">   ✅ Model 'llama3' loaded successfully</text>
    <text y="140" fill="#8b949e">   API:  http://localhost:8080</text>
    <text y="160" fill="#8b949e">   UI:   http://localhost:3000</text>
    <text y="180" fill="#8b949e">   Docs: http://localhost:8080/docs</text>

    <!-- Command 3: Chat -->
    <text y="216" fill="#8b949e">$</text>
    <text x="18" y="216" fill="#79c0ff">localmind</text>
    <text x="100" y="216" fill="#c9d1d9">chat --model llama3</text>

    <text y="244" fill="#58a6ff">🧠 LocalMind CLI — Type 'exit' to quit</text>
    <text y="268" fill="#c9d1d9">You:</text>
    <text x="42" y="268" fill="#e6edf3"> Explain quantum computing simply.</text>

    <text y="296" fill="#c9d1d9">AI:</text>
    <text x="30" y="296" fill="#3fb950"> Quantum computing uses quantum bits (qubits) instead of</text>
    <text x="30" y="316" fill="#3fb950"> classical bits. Unlike regular bits that are either 0 or 1,</text>
    <text x="30" y="336" fill="#3fb950"> qubits can exist in multiple states simultaneously through</text>
    <text x="30" y="356" fill="#3fb950"> a property called superposition. This allows quantum</text>
    <text x="30" y="376" fill="#3fb950"> computers to process vast amounts of data in parallel...</text>

    <!-- Blinking cursor -->
    <rect x="30" y="386" width="8" height="16" fill="#58a6ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>