<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <defs>
    <linearGradient id="sidebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="msguser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="msgai" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#282e36"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="780" height="520" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="780" height="38" rx="12" fill="#2d333b"/>
  <rect y="26" width="780" height="12" fill="#2d333b"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="390" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#8b949e">🧠 LocalMind — http://localhost:3000</text>

  <!-- Sidebar -->
  <rect x="0" y="38" width="200" height="482" rx="0" fill="url(#sidebar)"/>
  <rect x="0" y="508" width="200" height="12" fill="#161b22"/>
  <rect x="198" y="38" width="2" height="482" fill="#30363d"/>

  <!-- Sidebar content -->
  <g font-family="system-ui,sans-serif" font-size="12">
    <text x="16" y="66" fill="#f0f6fc" font-weight="bold" font-size="14">💬 Chats</text>

    <!-- Chat items -->
    <rect x="8" y="80" width="184" height="32" rx="6" fill="#1f6feb" opacity="0.2"/>
    <text x="20" y="100" fill="#58a6ff">🧠 AI Research</text>
    <text x="20" y="128" fill="#8b949e">📊 Data Analysis</text>
    <text x="20" y="156" fill="#8b949e">💻 Code Helper</text>
    <text x="20" y="184" fill="#8b949e">📝 Blog Writer</text>

    <text x="16" y="220" fill="#f0f6fc" font-weight="bold" font-size="14">🤖 Agents</text>
    <text x="20" y="244" fill="#8b949e">🔍 Researcher</text>
    <text x="20" y="268" fill="#8b949e">👨‍💻 Coder</text>
    <text x="20" y="292" fill="#8b949e">📊 Analyst</text>
    <text x="20" y="316" fill="#8b949e">✍️ Writer</text>

    <!-- Model selector -->
    <rect x="12" y="440" width="176" height="32" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="24" y="460" fill="#58a6ff" font-size="11">🦙 llama3</text>
    <text x="164" y="460" fill="#484f58" font-size="10">▼</text>
  </g>

  <!-- Main chat area -->
  <g font-family="system-ui,sans-serif">
    <!-- Model badge -->
    <rect x="220" y="50" width="120" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="280" y="66" text-anchor="middle" fill="#8b949e" font-size="11">🦙 Llama 3 · 8B</text>

    <!-- User message -->
    <rect x="220" y="90" width="540" height="44" rx="10" fill="url(#msguser)" opacity="0.9"/>
    <text x="236" y="108" fill="#ffffff" font-size="13" font-weight="500">You</text>
    <text x="236" y="126" fill="rgba(255,255,255,0.9)" font-size="12">What are the latest trends in open-source AI?</text>

    <!-- AI message -->
    <rect x="220" y="148" width="540" height="160" rx="10" fill="url(#msgai)"/>
    <text x="236" y="170" fill="#58a6ff" font-size="13" font-weight="500">🧠 LocalMind</text>
    <text x="236" y="192" fill="#c9d1d9" font-size="12">Here are the key trends in open-source AI:</text>
    <text x="236" y="214" fill="#3fb950" font-size="12">1. <tspan fill="#c9d1d9">Local AI Models</tspan> <tspan fill="#8b949e">— Llama 3, Mistral, Qwen 2</tspan></text>
    <text x="236" y="236" fill="#3fb950" font-size="12">2. <tspan fill="#c9d1d9">AI Agents</tspan> <tspan fill="#8b949e">— Autonomous multi-step workflows</tspan></text>
    <text x="236" y="258" fill="#3fb950" font-size="12">3. <tspan fill="#c9d1d9">RAG Pipelines</tspan> <tspan fill="#8b949e">— Private document intelligence</tspan></text>
    <text x="236" y="280" fill="#3fb950" font-size="12">4. <tspan fill="#c9d1d9">Edge AI</tspan> <tspan fill="#8b949e">— On-device inference optimization</tspan></text>
    <text x="236" y="300" fill="#484f58" font-size="11">Sources: 3 documents · Generated in 2.3s</text>

    <!-- Input area -->
    <rect x="220" y="440" width="540" height="44" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="240" y="466" fill="#484f58" font-size="13">Type your message...</text>
    <rect x="710" y="448" width="36" height="28" rx="6" fill="#1f6feb"/>
    <text x="728" y="467" text-anchor="middle" fill="white" font-size="14">➤</text>
  </g>
</svg>