<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
  <style>
    @keyframes flowDash { to{stroke-dashoffset:-20} }
    @keyframes pulse { 0%,100%{r:42} 50%{r:46} }
    @keyframes nodeFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .flow{stroke:#8b5cf6;stroke-width:2;fill:none;stroke-dasharray:6,4;animation:flowDash 1s linear infinite}
    .flow2{stroke:#6366f1;stroke-width:2;fill:none;stroke-dasharray:6,4;animation:flowDash 1.5s linear infinite}
    .center-pulse{animation:pulse 3s ease-in-out infinite}
    .node-float{animation:nodeFloat 4s ease-in-out infinite}
    .node-float2{animation:nodeFloat 4s ease-in-out infinite;animation-delay:1s}
    .node-float3{animation:nodeFloat 4s ease-in-out infinite;animation-delay:2s}
    .node-float4{animation:nodeFloat 4s ease-in-out infinite;animation-delay:3s}
  </style>
  <rect width="900" height="500" fill="#0f0f23" rx="12"/>
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="url(#agentGrad)">Multi-Agent Collaboration</text>
  <line x1="280" y1="50" x2="620" y2="50" stroke="url(#agentGrad)" stroke-width="2" opacity="0.4"/>
  <!-- Connection lines (behind nodes) -->
  <!-- Orchestrator to Coder -->
  <line x1="450" y1="230" x2="180" y2="140" class="flow"/>
  <!-- Orchestrator to Research -->
  <line x1="450" y1="230" x2="720" y2="140" class="flow2"/>
  <!-- Orchestrator to Data -->
  <line x1="450" y1="230" x2="180" y2="340" class="flow2"/>
  <!-- Orchestrator to Memory -->
  <line x1="450" y1="230" x2="720" y2="340" class="flow"/>
  <!-- Agent to Agent connections -->
  <line x1="180" y1="140" x2="720" y2="140" stroke="#312e81" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <line x1="180" y1="340" x2="720" y2="340" stroke="#312e81" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <!-- Central Orchestrator -->
  <g filter="url(#glow)">
    <circle cx="450" cy="230" r="42" fill="#1e1b4b" stroke="url(#agentGrad)" stroke-width="2.5" class="center-pulse"/>
  </g>
  <text x="450" y="222" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">Orchestrator</text>
  <text x="450" y="240" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#818cf8">Task Router</text>
  <!-- Coder Agent -->
  <g class="node-float" filter="url(#nodeGlow)">
    <circle cx="180" cy="140" r="35" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  </g>
  <text x="180" y="130" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20">&#x1F4BB;</text>
  <text x="180" y="150" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">Coder</text>
  <text x="180" y="190" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Writes code</text>
  <!-- Research Agent -->
  <g class="node-float2" filter="url(#nodeGlow)">
    <circle cx="720" cy="140" r="35" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2"/>
  </g>
  <text x="720" y="130" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20">&#x1F50D;</text>
  <text x="720" y="150" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#c4b5fd">Research</text>
  <text x="720" y="190" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Finds docs</text>
  <!-- Data Agent -->
  <g class="node-float3" filter="url(#nodeGlow)">
    <circle cx="180" cy="340" r="35" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="180" y="330" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20">&#x1F4CA;</text>
  <text x="180" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#d8b4fe">Data</text>
  <text x="180" y="390" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Validates</text>
  <!-- Memory (shared) -->
  <g class="node-float4" filter="url(#nodeGlow)">
    <circle cx="720" cy="340" r="35" fill="#1e1b4b" stroke="#a855f7" stroke-width="2"/>
  </g>
  <text x="720" y="330" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20">&#x1F9E0;</text>
  <text x="720" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="600" fill="#e9d5ff">Memory</text>
  <text x="720" y="390" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Shared context</text>
  <!-- Task flow at bottom -->
  <rect x="40" y="420" width="820" height="60" rx="10" fill="#1a1a3e" stroke="#1e1b4b" stroke-width="1"/>
  <text x="60" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#a5b4fc">Task Flow:</text>
  <text x="140" y="445" font-family="'SF Mono',monospace" font-size="11" fill="#e0e7ff">"Build REST API"</text>
  <text x="290" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#6b7280">&#x2192;</text>
  <text x="310" y="445" font-family="'SF Mono',monospace" font-size="11" fill="#818cf8">Orchestrator splits</text>
  <text x="460" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#6b7280">&#x2192;</text>
  <text x="480" y="445" font-family="'SF Mono',monospace" font-size="11" fill="#a78bfa">Coder writes</text>
  <text x="590" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#6b7280">&#x2192;</text>
  <text x="610" y="445" font-family="'SF Mono',monospace" font-size="11" fill="#c084fc">Research docs</text>
  <text x="730" y="445" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#6b7280">&#x2192;</text>
  <text x="750" y="445" font-family="'SF Mono',monospace" font-size="11" fill="#22c55e">Merged!</text>
  <text x="140" y="465" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Data validates schema &amp; types</text>
  <text x="400" y="465" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6b7280">Memory stores patterns for future</text>
</svg>