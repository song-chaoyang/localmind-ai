<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="390" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#f0f6fc">✨ Feature Overview</text>

  <!-- Row 1 -->
  <!-- Privacy -->
  <g filter="url(#shadow)">
    <rect x="30" y="65" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="145" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🔒</text>
    <text x="145" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">100% Private</text>
    <text x="145" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">All data stays on your</text>
    <text x="145" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">machine. Zero telemetry.</text>
    <text x="145" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">No cloud dependency.</text>
  </g>

  <!-- Multi-Model -->
  <g filter="url(#shadow)">
    <rect x="275" y="65" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="390" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🦙</text>
    <text x="390" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">Multi-Model</text>
    <text x="390" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Llama 3, Mistral, Qwen,</text>
    <text x="390" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">DeepSeek, Phi-3, Gemma</text>
    <text x="390" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">and hundreds more.</text>
  </g>

  <!-- One Command -->
  <g filter="url(#shadow)">
    <rect x="520" y="65" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="635" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">⚡</text>
    <text x="635" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">One Command</text>
    <text x="635" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Install and start in</text>
    <text x="635" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">seconds. No complex</text>
    <text x="635" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">setup required.</text>
  </g>

  <!-- Row 2 -->
  <!-- Agents -->
  <g filter="url(#shadow)">
    <rect x="30" y="215" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="145" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🤖</text>
    <text x="145" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">AI Agents</text>
    <text x="145" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Research, Code, Analyze,</text>
    <text x="145" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Write — or create your</text>
    <text x="145" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">own custom agents.</text>
  </g>

  <!-- RAG -->
  <g filter="url(#shadow)">
    <rect x="275" y="215" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="390" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">📊</text>
    <text x="390" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">RAG Pipeline</text>
    <text x="390" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Ingest documents, build</text>
    <text x="390" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">knowledge bases, and</text>
    <text x="390" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">augment AI responses.</text>
  </g>

  <!-- Plugins -->
  <g filter="url(#shadow)">
    <rect x="520" y="215" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="635" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🔌</text>
    <text x="635" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">Plugin Ecosystem</text>
    <text x="635" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Extend with community</text>
    <text x="635" y="315" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">plugins. One-click install.</text>
    <text x="635" y="332" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Build your own with SDK.</text>
  </g>

  <!-- Row 3 -->
  <!-- Memory -->
  <g filter="url(#shadow)">
    <rect x="30" y="365" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="145" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🧠</text>
    <text x="145" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">Memory System</text>
    <text x="145" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Short-term, long-term,</text>
    <text x="145" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">and semantic memory for</text>
    <text x="145" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">persistent context.</text>
  </g>

  <!-- Workflows -->
  <g filter="url(#shadow)">
    <rect x="275" y="365" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="390" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">🔄</text>
    <text x="390" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">Workflows</text>
    <text x="390" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Orchestrate multi-step</text>
    <text x="390" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">tasks with dependencies,</text>
    <text x="390" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">conditions, and retries.</text>
  </g>

  <!-- Open Source -->
  <g filter="url(#shadow)">
    <rect x="520" y="365" width="230" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="635" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="32">💚</text>
    <text x="635" y="425" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="bold">Open Source</text>
    <text x="635" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">MIT licensed. Community</text>
    <text x="635" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">driven. No hidden costs.</text>
    <text x="635" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">No premium tiers.</text>
  </g>
</svg>