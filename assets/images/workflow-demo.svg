<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" width="780" height="380">
  <defs>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/><stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/><stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/><stop offset="100%" style="stop-color:#f79862"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="380" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#f0f6fc">🔄 Workflow: Daily AI News Report</text>

  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="160" height="120" rx="12" fill="#0d1117" stroke="url(#step1)" stroke-width="2"/>
    <circle cx="110" cy="95" r="14" fill="url(#step1)"/>
    <text x="110" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" font-weight="bold">1</text>
    <text x="110" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#58a6ff" font-weight="bold">Fetch News</text>
    <text x="110" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">🔍 Research Agent</text>
    <text x="110" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3fb950">✅ 12 articles</text>
    <text x="110" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#484f58">1.2s</text>
  </g>

  <!-- Arrow 1→2 -->
  <g>
    <line x1="195" y1="130" x2="225" y2="130" stroke="#30363d" stroke-width="2"/>
    <polygon points="225,125 235,130 225,135" fill="#30363d"/>
  </g>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="240" y="70" width="160" height="120" rx="12" fill="#0d1117" stroke="url(#step2)" stroke-width="2"/>
    <circle cx="320" cy="95" r="14" fill="url(#step2)"/>
    <text x="320" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" font-weight="bold">2</text>
    <text x="320" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a371f7" font-weight="bold">Summarize</text>
    <text x="320" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">✍️ Writer Agent</text>
    <text x="320" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3fb950">✅ 5 summaries</text>
    <text x="320" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#484f58">3.8s</text>
  </g>

  <!-- Arrow 2→3 -->
  <g>
    <line x1="405" y1="130" x2="435" y2="130" stroke="#30363d" stroke-width="2"/>
    <polygon points="435,125 445,130 435,135" fill="#30363d"/>
  </g>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="450" y="70" width="160" height="120" rx="12" fill="#0d1117" stroke="url(#step3)" stroke-width="2"/>
    <circle cx="530" cy="95" r="14" fill="url(#step3)"/>
    <text x="530" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" font-weight="bold">3</text>
    <text x="530" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#3fb950" font-weight="bold">Analyze</text>
    <text x="530" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">📊 Analyst Agent</text>
    <text x="530" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3fb950">✅ Trends found</text>
    <text x="530" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#484f58">2.1s</text>
  </g>

  <!-- Arrow 3→4 -->
  <g>
    <line x1="615" y1="130" x2="645" y2="130" stroke="#30363d" stroke-width="2"/>
    <polygon points="645,125 655,130 645,135" fill="#30363d"/>
  </g>

  <!-- Step 4 -->
  <g filter="url(#shadow)">
    <rect x="660" y="70" width="100" height="120" rx="12" fill="#0d1117" stroke="url(#step4)" stroke-width="2"/>
    <circle cx="710" cy="95" r="14" fill="url(#step4)"/>
    <text x="710" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="white" font-weight="bold">4</text>
    <text x="710" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f79862" font-weight="bold">Report</text>
    <text x="710" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">📄 Output</text>
    <text x="710" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3fb950">✅ Done</text>
    <text x="710" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#484f58">0.5s</text>
  </g>

  <!-- Output preview -->
  <rect x="30" y="220" width="720" height="140" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="245" font-family="system-ui,sans-serif" font-size="12" fill="#8b949e" font-weight="bold">📋 Generated Report Preview</text>
  <line x1="50" y1="255" x2="730" y2="255" stroke="#21262d" stroke-width="1"/>

  <g font-family="system-ui,sans-serif" font-size="11">
    <text x="50" y="278" fill="#f0f6fc" font-weight="bold">Daily AI News Report — April 12, 2026</text>
    <text x="50" y="300" fill="#3fb950">▸</text>
    <text x="65" y="300" fill="#c9d1d9">OpenAI releases GPT-5 with enhanced reasoning capabilities</text>
    <text x="50" y="320" fill="#3fb950">▸</text>
    <text x="65" y="320" fill="#c9d1d9">Meta unveils Llama 4: new state-of-the-art open model</text>
    <text x="50" y="340" fill="#3fb950">▸</text>
    <text x="65" y="340" fill="#c9d1d9">Google DeepMind achieves breakthrough in protein folding</text>
  </g>

  <!-- Stats bar -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#8b949e">
    <text x="50" y="365">Total time: 7.6s</text>
    <text x="200" y="365">|</text>
    <text x="220" y="365">Agents used: 3</text>
    <text x="360" y="365">|</text>
    <text x="380" y="365">Status:</text>
    <text x="420" y="365" fill="#3fb950">✅ Completed</text>
  </g>
</svg>