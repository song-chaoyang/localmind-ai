<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>
  <style>
    @keyframes flowRight { from{stroke-dashoffset:20} to{stroke-dashoffset:0} }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes glow { 0%,100%{filter:drop-shadow(0 0 4px #6366f1)} 50%{filter:drop-shadow(0 0 12px #a855f7)} }
    .flow-line{stroke:#8b5cf6;stroke-width:2;fill:none;stroke-dasharray:8,4;animation:flowRight 1s linear infinite}
    .flow-line2{stroke:#6366f1;stroke-width:2;fill:none;stroke-dasharray:8,4;animation:flowRight 1.5s linear infinite}
    .pulse-node{animation:pulse 2s ease-in-out infinite}
    .glow-box{animation:glow 3s ease-in-out infinite}
  </style>
  <rect width="900" height="500" fill="#0f0f23" rx="12"/>
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="700" fill="url(#memGrad)">Memory Architecture</text>
  <line x1="300" y1="52" x2="600" y2="52" stroke="url(#memGrad)" stroke-width="2" opacity="0.4"/>
  <!-- Layer 1: Short-term -->
  <g class="glow-box">
    <rect x="40" y="80" width="240" height="200" rx="12" fill="url(#layer1Grad)" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text x="160" y="110" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#818cf8">Short-Term Memory</text>
  <text x="160" y="130" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Sliding Window (last 50 msgs)</text>
  <!-- Items in layer 1 -->
  <rect x="60" y="148" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="160" y="168" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Conversations</text>
  <rect x="60" y="186" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="160" y="206" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">User Profile</text>
  <rect x="60" y="224" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#4338ca" stroke-width="1"/>
  <text x="160" y="244" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Current Context</text>
  <!-- Layer 2: Long-term -->
  <g class="glow-box" style="animation-delay:1s">
    <rect x="330" y="80" width="240" height="200" rx="12" fill="url(#layer2Grad)" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="450" y="110" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#a78bfa">Long-Term Memory</text>
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">SQLite Persistent Storage</text>
  <!-- Items in layer 2 -->
  <rect x="350" y="148" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1"/>
  <text x="450" y="168" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Entities</text>
  <rect x="350" y="186" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1"/>
  <text x="450" y="206" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">User Preferences</text>
  <rect x="350" y="224" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1"/>
  <text x="450" y="244" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Conversation History</text>
  <!-- Layer 3: Skill DNA -->
  <g class="glow-box" style="animation-delay:2s">
    <rect x="620" y="80" width="240" height="200" rx="12" fill="url(#layer3Grad)" stroke="#a855f7" stroke-width="1.5"/>
  </g>
  <text x="740" y="110" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#c084fc">Skill DNA</text>
  <text x="740" y="130" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Auto-Evolved Behaviors</text>
  <!-- Items in layer 3 -->
  <rect x="640" y="148" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#9333ea" stroke-width="1"/>
  <text x="740" y="168" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Skills</text>
  <rect x="640" y="186" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#9333ea" stroke-width="1"/>
  <text x="740" y="206" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Patterns</text>
  <rect x="640" y="224" width="200" height="30" rx="6" fill="#1e1b4b" stroke="#9333ea" stroke-width="1"/>
  <text x="740" y="244" text-anchor="middle" font-family="'SF Mono',monospace" font-size="11" fill="#c4b5fd">Success Metrics</text>
  <!-- Flow arrows between layers -->
  <line x1="280" y1="180" x2="328" y2="180" class="flow-line" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="180" x2="618" y2="180" class="flow-line" marker-end="url(#arrowhead)"/>
  <!-- Process boxes -->
  <rect x="280" y="310" width="160" height="50" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="333" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#818cf8">Auto-Extract</text>
  <text x="360" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Entities &amp; Facts</text>
  <rect x="460" y="310" width="160" height="50" rx="10" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="540" y="333" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#c084fc">Pattern Detection</text>
  <text x="540" y="350" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Skill Evolution</text>
  <!-- Arrows from layers to processes -->
  <line x1="160" y1="280" x2="310" y2="308" class="flow-line2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="280" x2="490" y2="308" class="flow-line2" marker-end="url(#arrowhead)"/>
  <!-- Stats bar at bottom -->
  <rect x="40" y="400" width="820" height="70" rx="10" fill="#1a1a3e" stroke="#1e1b4b" stroke-width="1"/>
  <text x="100" y="428" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#818cf8">1,247</text>
  <text x="100" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Memories Stored</text>
  <line x1="200" y1="415" x2="200" y2="460" stroke="#1e1b4b" stroke-width="1"/>
  <text x="300" y="428" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#a78bfa">47</text>
  <text x="300" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Skills Learned</text>
  <line x1="400" y1="415" x2="400" y2="460" stroke="#1e1b4b" stroke-width="1"/>
  <text x="500" y="428" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#c084fc">92%</text>
  <text x="500" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Recall Accuracy</text>
  <line x1="600" y1="415" x2="600" y2="460" stroke="#1e1b4b" stroke-width="1"/>
  <text x="700" y="428" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#d8b4fe">3.2ms</text>
  <text x="700" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Avg Retrieval</text>
  <line x1="800" y1="415" x2="800" y2="460" stroke="#1e1b4b" stroke-width="1"/>
  <text x="840" y="428" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="700" fill="#e9d5ff">5MB</text>
  <text x="840" y="450" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">DB Size</text>
</svg>