<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="780" height="400">
  <defs>
    <linearGradient id="dropZone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="780" height="400" rx="10" fill="#0d1117"/>
  <rect width="780" height="400" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc">RAG - Document Q&amp;A</text>
  <line x1="0" y1="42" x2="780" y2="42" stroke="#30363d" stroke-width="1"/>

  <!-- LEFT PANEL: File Upload -->
  <g transform="translate(15, 55)">
    <rect width="240" height="330" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="16" y="24" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0f6fc">Upload Documents</text>

    <!-- Drag and drop zone -->
    <rect x="12" y="38" width="216" height="160" rx="8" fill="url(#dropZone)" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 3"/>

    <!-- PDF icon -->
    <g transform="translate(80, 55)">
      <rect x="0" y="0" width="60" height="70" rx="4" fill="#ff5f57" opacity="0.15"/>
      <rect x="0" y="0" width="60" height="70" rx="4" fill="none" stroke="#ff5f57" stroke-width="1" opacity="0.4"/>
      <text x="30" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" fill="#ff5f57" text-anchor="middle">PDF</text>
      <!-- Fold corner -->
      <path d="M40,0 L60,0 L60,20 Z" fill="#ff5f57" opacity="0.1"/>
    </g>

    <text x="120" y="148" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Drag &amp; drop files here</text>
    <text x="120" y="164" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">PDF, TXT, DOCX, MD</text>

    <!-- Browse button -->
    <rect x="60" y="210" width="120" height="30" rx="6" fill="#58a6ff" opacity="0.15" stroke="#58a6ff" stroke-width="1"/>
    <text x="120" y="230" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#58a6ff" text-anchor="middle">Browse Files</text>

    <!-- Uploaded file list -->
    <text x="16" y="262" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" fill="#8b949e">Uploaded:</text>

    <g transform="translate(16, 272)">
      <rect width="208" height="28" rx="4" fill="#3fb950" opacity="0.08"/>
      <text x="8" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3fb950">&#10003;</text>
      <text x="24" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c9d1d9">report.pdf</text>
      <text x="170" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">42 pg</text>
    </g>
    <g transform="translate(16, 304)">
      <rect width="208" height="28" rx="4" fill="#3fb950" opacity="0.08"/>
      <text x="8" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#3fb950">&#10003;</text>
      <text x="24" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#c9d1d9">notes.md</text>
      <text x="170" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">8 pg</text>
    </g>
  </g>

  <!-- Arrow between panels -->
  <g transform="translate(268, 200)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="url(#arrowGrad)" stroke-width="2"/>
    <polygon points="30,-5 40,0 30,5" fill="#bc8cff"/>
  </g>

  <!-- RIGHT PANEL: Chat -->
  <g transform="translate(310, 55)">
    <rect width="455" height="330" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

    <!-- System message -->
    <g transform="translate(12, 12)">
      <rect width="431" height="32" rx="6" fill="#58a6ff" opacity="0.08"/>
      <text x="12" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#58a6ff">&#128196; report.pdf uploaded (42 pages, 3 chunks)</text>
    </g>

    <!-- User question -->
    <g transform="translate(12, 55)">
      <rect width="431" height="36" rx="10" fill="#1f6feb" opacity="0.12"/>
      <rect width="431" height="36" rx="10" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.3"/>
      <text x="14" y="24" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#f0f6fc">What are the key findings?</text>
    </g>

    <!-- AI response with citations -->
    <g transform="translate(12, 105)">
      <circle cx="10" cy="10" r="10" fill="#bc8cff" opacity="0.2"/>
      <text x="10" y="14" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#bc8cff" text-anchor="middle">AI</text>

      <text x="28" y="14" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#f0f6fc" font-weight="600">Based on the document:</text>

      <text x="28" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0" fill="#58a6ff" font-weight="600">1.</tspan><tspan fill="#c9d1d9"> Revenue increased by 34% year-over-year, driven</tspan>
      </text>
      <text x="28" y="54" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0">primarily by the SaaS segment </tspan><tspan fill="#d29922" font-size="10">[Source: page 12]</tspan>
      </text>

      <text x="28" y="76" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0" fill="#58a6ff" font-weight="600">2.</tspan><tspan fill="#c9d1d9"> Customer retention improved to 92%, up from 87%</tspan>
      </text>
      <text x="28" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0">in the previous quarter </tspan><tspan fill="#d29922" font-size="10">[Source: page 18]</tspan>
      </text>

      <text x="28" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0" fill="#58a6ff" font-weight="600">3.</tspan><tspan fill="#c9d1d9"> The R&amp;D team filed 5 new patents in AI/ML</tspan>
      </text>
      <text x="28" y="130" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#c9d1d9">
        <tspan x="28" dy="0">technologies </tspan><tspan fill="#d29922" font-size="10">[Source: page 27]</tspan>
      </text>

      <text x="28" y="158" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">
        3 sources cited from report.pdf
      </text>
    </g>

    <!-- Input -->
    <g transform="translate(12, 290)">
      <rect width="431" height="30" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
      <text x="14" y="20" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e">Ask about your documents...</text>
    </g>
  </g>
</svg>