<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/><stop offset="100%" style="stop-color:#388bfd"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8957e5"/><stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/><stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633"/><stop offset="100%" style="stop-color:#f85149"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0883e"/><stop offset="100%" style="stop-color:#f79862"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/><stop offset="100%" style="stop-color:#21262d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#f0f6fc">LocalMind Architecture</text>

  <!-- Connection lines (drawn first, behind boxes) -->
  <g stroke="#30363d" stroke-width="2" fill="none" stroke-dasharray="6,3">
    <!-- CLI to Engine -->
    <line x1="160" y1="120" x2="370" y2="200"/>
    <!-- Web UI to Engine -->
    <line x1="400" y1="120" x2="400" y2="200"/>
    <!-- API to Engine -->
    <line x1="640" y1="120" x2="430" y2="200"/>
    <!-- Engine to Model Manager -->
    <line x1="340" y1="250" x2="160" y2="340"/>
    <!-- Engine to Agent System -->
    <line x1="400" y1="260" x2="400" y2="340"/>
    <!-- Engine to Memory -->
    <line x1="460" y1="250" x2="640" y2="340"/>
    <!-- Agent to Plugins -->
    <line x1="340" y1="400" x2="160" y2="460"/>
    <!-- Agent to RAG -->
    <line x1="460" y1="400" x2="400" y2="460"/>
    <!-- Agent to Workflow -->
    <line x1="460" y1="400" x2="640" y2="460"/>
  </g>

  <!-- Layer 1: User Interfaces -->
  <g filter="url(#shadow)">
    <rect x="80" y="65" width="160" height="50" rx="10" fill="url(#g1)"/>
    <text x="160" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" font-weight="bold">⌨️ CLI</text>

    <rect x="300" y="65" width="200" height="50" rx="10" fill="url(#g1)"/>
    <text x="400" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" font-weight="bold">🌐 Web UI</text>

    <rect x="560" y="65" width="160" height="50" rx="10" fill="url(#g1)"/>
    <text x="640" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="white" font-weight="bold">🔗 REST API</text>
  </g>

  <!-- Layer 2: Core Engine -->
  <g filter="url(#shadow)">
    <rect x="280" y="195" width="240" height="65" rx="12" fill="url(#g2)" stroke="#a371f7" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="white" font-weight="bold">🧠 Core Engine</text>
    <text x="400" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Config · Events · Bus</text>
  </g>

  <!-- Layer 3: Core Systems -->
  <g filter="url(#shadow)">
    <rect x="60" y="335" width="180" height="55" rx="10" fill="url(#g3)"/>
    <text x="150" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="white" font-weight="bold">🦙 Model Manager</text>
    <text x="150" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Ollama · llama.cpp · vLLM</text>

    <rect x="290" y="335" width="220" height="55" rx="10" fill="url(#g4)"/>
    <text x="400" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="white" font-weight="bold">🤖 Agent System</text>
    <text x="400" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Research · Code · Data · Write</text>

    <rect x="550" y="335" width="180" height="55" rx="10" fill="url(#g5)"/>
    <text x="640" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="white" font-weight="bold">🧠 Memory System</text>
    <text x="640" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Short-term · Long-term · Semantic</text>
  </g>

  <!-- Layer 4: Extensions -->
  <g filter="url(#shadow)">
    <rect x="60" y="440" width="180" height="45" rx="10" fill="url(#g6)" stroke="#30363d" stroke-width="1"/>
    <text x="150" y="467" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c9d1d9" font-weight="bold">🔌 Plugin System</text>

    <rect x="290" y="440" width="220" height="45" rx="10" fill="url(#g6)" stroke="#30363d" stroke-width="1"/>
    <text x="400" y="467" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c9d1d9" font-weight="bold">📊 RAG Pipeline</text>

    <rect x="550" y="440" width="180" height="45" rx="10" fill="url(#g6)" stroke="#30363d" stroke-width="1"/>
    <text x="640" y="467" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#c9d1d9" font-weight="bold">🔄 Workflow Engine</text>
  </g>

  <!-- Layer labels -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#484f58">
    <text x="20" y="95" transform="rotate(-90,20,95)">INTERFACE</text>
    <text x="20" y="230" transform="rotate(-90,20,230)">CORE</text>
    <text x="20" y="365" transform="rotate(-90,20,365)">SYSTEMS</text>
    <text x="20" y="465" transform="rotate(-90,20,465)">EXTENSIONS</text>
  </g>
</svg>