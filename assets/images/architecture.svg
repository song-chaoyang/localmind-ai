<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#d2a8ff"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#56d364"/>
    </linearGradient>
    <linearGradient id="layer4aGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#e3b341"/>
    </linearGradient>
    <linearGradient id="layer4bGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f778ba"/>
      <stop offset="100%" stop-color="#ff9bce"/>
    </linearGradient>
    <linearGradient id="layer4cGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#56d4dd"/>
      <stop offset="100%" stop-color="#79e8f0"/>
    </linearGradient>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="10" fill="#0d1117"/>
  <rect width="800" height="400" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc" text-anchor="middle">System Architecture</text>

  <!-- Layer 1: Web UI -->
  <g transform="translate(280, 50)">
    <rect width="240" height="60" rx="10" fill="#161b22" stroke="url(#layer1Grad)" stroke-width="2"/>
    <!-- Browser icon -->
    <rect x="16" y="12" width="36" height="28" rx="4" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="16" y1="22" x2="52" y2="22" stroke="#58a6ff" stroke-width="1"/>
    <circle cx="22" cy="17" r="2" fill="#ff5f57"/>
    <circle cx="28" cy="17" r="2" fill="#febc2e"/>
    <circle cx="34" cy="17" r="2" fill="#28c840"/>
    <text x="66" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc">Web UI</text>
    <text x="66" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">React + TypeScript</text>
    <text x="200" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#58a6ff">:3000</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="400" y1="115" x2="400" y2="150" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <text x="412" y="137" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">HTTP/WebSocket</text>

  <!-- Layer 2: FastAPI Server -->
  <g transform="translate(250, 155)">
    <rect width="300" height="60" rx="10" fill="#161b22" stroke="url(#layer2Grad)" stroke-width="2"/>
    <!-- Gear icon -->
    <circle cx="34" cy="30" r="14" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="34" cy="30" r="5" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="34" y1="13" x2="34" y2="19" stroke="#bc8cff" stroke-width="2"/>
    <line x1="34" y1="41" x2="34" y2="47" stroke="#bc8cff" stroke-width="2"/>
    <line x1="17" y1="30" x2="23" y2="30" stroke="#bc8cff" stroke-width="2"/>
    <line x1="45" y1="30" x2="51" y2="30" stroke="#bc8cff" stroke-width="2"/>
    <text x="62" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#f0f6fc">FastAPI Server</text>
    <text x="62" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">Python + ASGI + REST API</text>
    <text x="260" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#bc8cff">:8000</text>
  </g>

  <!-- Arrows to bottom layer -->
  <line x1="330" y1="220" x2="165" y2="275" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <line x1="400" y1="220" x2="400" y2="275" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <line x1="470" y1="220" x2="635" y2="275" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <!-- Layer 3: Bottom row -->
  <!-- Model Runtime -->
  <g transform="translate(30, 280)">
    <rect width="230" height="80" rx="10" fill="#161b22" stroke="url(#layer3Grad)" stroke-width="2"/>
    <!-- Chip icon -->
    <rect x="16" y="16" width="32" height="32" rx="4" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <rect x="22" y="22" width="20" height="20" rx="2" fill="#3fb950" opacity="0.2"/>
    <line x1="16" y1="28" x2="10" y2="28" stroke="#3fb950" stroke-width="1.5"/>
    <line x1="16" y1="36" x2="10" y2="36" stroke="#3fb950" stroke-width="1.5"/>
    <line x1="48" y1="28" x2="54" y2="28" stroke="#3fb950" stroke-width="1.5"/>
    <line x1="48" y1="36" x2="54" y2="36" stroke="#3fb950" stroke-width="1.5"/>
    <text x="60" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f0f6fc">Model Runtime</text>
    <text x="60" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">llama.cpp / Ollama</text>
    <text x="60" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#3fb950">CPU-optimized inference</text>
  </g>

  <!-- RAG Engine -->
  <g transform="translate(285, 280)">
    <rect width="230" height="80" rx="10" fill="#161b22" stroke="url(#layer4aGrad)" stroke-width="2"/>
    <!-- Document icon -->
    <rect x="16" y="14" width="28" height="34" rx="3" fill="none" stroke="#d29922" stroke-width="1.5"/>
    <line x1="22" y1="24" x2="38" y2="24" stroke="#d29922" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="30" x2="38" y2="30" stroke="#d29922" stroke-width="1" opacity="0.6"/>
    <line x1="22" y1="36" x2="34" y2="36" stroke="#d29922" stroke-width="1" opacity="0.6"/>
    <path d="M34,14 L44,14 L44,24 L34,24 Z" fill="#d29922" opacity="0.1"/>
    <text x="56" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f0f6fc">RAG Engine</text>
    <text x="56" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">Embeddings + Vector Search</text>
    <text x="56" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#d29922">Semantic document retrieval</text>
  </g>

  <!-- Storage -->
  <g transform="translate(540, 280)">
    <rect width="230" height="80" rx="10" fill="#161b22" stroke="url(#layer4cGrad)" stroke-width="2"/>
    <!-- Database icon -->
    <ellipse cx="32" cy="22" rx="16" ry="8" fill="none" stroke="#56d4dd" stroke-width="1.5"/>
    <line x1="16" y1="22" x2="16" y2="42" stroke="#56d4dd" stroke-width="1.5"/>
    <line x1="48" y1="22" x2="48" y2="42" stroke="#56d4dd" stroke-width="1.5"/>
    <ellipse cx="32" cy="42" rx="16" ry="8" fill="none" stroke="#56d4dd" stroke-width="1.5"/>
    <text x="60" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f0f6fc">Storage</text>
    <text x="60" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e">SQLite + File System</text>
    <text x="60" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#56d4dd">Zero-config persistence</text>
  </g>

  <!-- Layer labels -->
  <text x="790" y="84" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="end" opacity="0.6">PRESENTATION</text>
  <text x="790" y="188" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="end" opacity="0.6">APPLICATION</text>
  <text x="790" y="324" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e" text-anchor="end" opacity="0.6">INFRASTRUCTURE</text>

  <!-- Horizontal dividers -->
  <line x1="20" y1="130" x2="780" y2="130" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="20" y1="245" x2="780" y2="245" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
</svg>