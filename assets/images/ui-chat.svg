<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <linearGradient id="codeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1e24"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Main chat window -->
  <rect width="780" height="480" rx="10" fill="#0d1117"/>
  <rect width="780" height="480" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- macOS chrome -->
  <rect width="780" height="38" rx="10" fill="#161b22"/>
  <rect y="28" width="780" height="10" fill="#161b22"/>
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="390" y="24" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">OpenMind Chat</text>

  <!-- Top toolbar -->
  <rect x="0" y="38" width="780" height="36" fill="#161b22"/>
  <line x1="0" y1="74" x2="780" y2="74" stroke="#30363d" stroke-width="1"/>

  <!-- Model dropdown -->
  <rect x="12" y="44" width="140" height="26" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="24" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#f0f6fc">Llama 3 8B</text>
  <text x="130" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">&#9662;</text>

  <!-- File upload button -->
  <rect x="162" y="44" width="34" height="26" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="179" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">+</text>

  <!-- Dark/light mode toggle -->
  <rect x="710" y="44" width="58" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="738" cy="57" r="9" fill="#d29922"/>
  <text x="738" y="61" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#0d1117" text-anchor="middle">&#9790;</text>

  <!-- User message bubble -->
  <g transform="translate(60, 88)">
    <rect x="0" y="0" width="380" height="42" rx="12" fill="#1f6feb" opacity="0.18"/>
    <rect x="0" y="0" width="380" height="42" rx="12" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.35"/>
    <text x="16" y="27" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#f0f6fc">Write a Python function to sort a list</text>
  </g>

  <!-- AI response bubble -->
  <g transform="translate(60, 145)">
    <rect x="0" y="0" width="660" height="270" rx="12" fill="#161b22"/>
    <rect x="0" y="0" width="660" height="270" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- AI label -->
    <circle cx="18" cy="18" r="10" fill="#bc8cff" opacity="0.25"/>
    <text x="18" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#bc8cff" text-anchor="middle">AI</text>
    <text x="36" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#f0f6fc" font-weight="600">OpenMind</text>
    <text x="100" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e">Llama 3</text>

    <!-- Response text with markdown -->
    <text x="16" y="48" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#c9d1d9">
      <tspan font-weight="700" fill="#f0f6fc">Here's a Python function</tspan> to sort a list using merge sort:
    </text>

    <!-- Code block -->
    <rect x="16" y="62" width="628" height="120" rx="6" fill="url(#codeBg)" stroke="#30363d" stroke-width="1"/>
    <!-- Code header -->
    <rect x="16" y="62" width="628" height="22" rx="6" fill="#21262d"/>
    <rect x="16" y="78" width="628" height="6" fill="#21262d"/>
    <text x="28" y="78" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e">python</text>
    <rect x="600" y="66" width="32" height="16" rx="3" fill="transparent"/>
    <text x="616" y="78" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Copy</text>

    <!-- Code content with syntax highlighting -->
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="11.5">
      <tspan x="28" y="100" fill="#ff7b72">def</tspan><tspan fill="#c9d1d9"> </tspan><tspan fill="#d2a8ff">merge_sort</tspan><tspan fill="#c9d1d9">(arr):</tspan>
      <tspan x="28" y="118" fill="#c9d1d9">    </tspan><tspan fill="#ff7b72">if</tspan><tspan fill="#c9d1d9"> len(arr) &lt;= </tspan><tspan fill="#79c0ff">1</tspan><tspan fill="#c9d1d9">:</tspan>
      <tspan x="28" y="136" fill="#c9d1d9">        </tspan><tspan fill="#ff7b72">return</tspan><tspan fill="#c9d1d9"> arr</tspan>
      <tspan x="28" y="154" fill="#c9d1d9">    mid = len(arr) // </tspan><tspan fill="#79c0ff">2</tspan>
      <tspan x="28" y="172" fill="#c9d1d9">    </tspan><tspan fill="#ff7b72">return</tspan><tspan fill="#c9d1d9"> merge(</tspan>
      <tspan x="28" y="190" fill="#c9d1d9">        merge_sort(arr[:mid]),</tspan>
    </text>

    <!-- Explanation text -->
    <text x="16" y="200" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8b949e">
      <tspan x="16" dy="0">Time complexity: </tspan><tspan fill="#58a6ff" font-weight="600">O(n log n)</tspan>
    </text>

    <!-- Action buttons -->
    <g transform="translate(16, 240)">
      <rect x="0" y="0" width="50" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="25" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Copy</text>
      <rect x="58" y="0" width="70" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="93" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Regenerate</text>
      <rect x="136" y="0" width="40" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="156" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">&#128077;</text>
      <rect x="184" y="0" width="40" height="22" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <text x="204" y="15" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">&#128078;</text>
    </g>
  </g>

  <!-- Phone mockup on the side -->
  <g transform="translate(680, 100)">
    <rect x="0" y="0" width="80" height="150" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- Phone notch -->
    <rect x="25" y="4" width="30" height="5" rx="2" fill="#21262d"/>
    <!-- Phone screen -->
    <rect x="4" y="14" width="72" height="120" rx="2" fill="#161b22"/>
    <!-- Mini chat bubbles -->
    <rect x="8" y="20" width="50" height="10" rx="4" fill="#1f6feb" opacity="0.3"/>
    <rect x="18" y="36" width="52" height="20" rx="4" fill="#21262d"/>
    <rect x="8" y="62" width="45" height="10" rx="4" fill="#1f6feb" opacity="0.3"/>
    <rect x="18" y="78" width="52" height="16" rx="4" fill="#21262d"/>
    <!-- Mini input -->
    <rect x="8" y="118" width="56" height="10" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  </g>

  <!-- Input area -->
  <rect x="0" y="430" width="780" height="50" fill="#161b22"/>
  <line x1="0" y1="430" x2="780" y2="430" stroke="#30363d" stroke-width="1"/>
  <rect x="16" y="440" width="700" height="30" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="32" y="460" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#8b949e">Type a message... (Shift+Enter for new line)</text>
  <!-- Attach -->
  <text x="724" y="460" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8b949e">&#128206;</text>
  <!-- Send -->
  <rect x="738" y="440" width="30" height="30" rx="8" fill="#238636"/>
  <text x="753" y="460" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">&#10148;</text>
</svg>