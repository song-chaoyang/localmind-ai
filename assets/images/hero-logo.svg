<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#f778ba"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="400" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="800" y2="80" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#c9d1d9" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="#c9d1d9" stroke-width="1"/>
  </g>

  <!-- Brain Icon with neural connections -->
  <g transform="translate(105, 130)" filter="url(#softGlow)">
    <!-- Brain outline -->
    <ellipse cx="0" cy="0" rx="52" ry="48" fill="none" stroke="url(#brainGrad)" stroke-width="2.5" opacity="0.8"/>
    <!-- Left hemisphere -->
    <path d="M-5,-45 C-30,-40 -48,-20 -48,5 C-48,25 -35,42 -15,45" fill="none" stroke="url(#brainGrad)" stroke-width="2" opacity="0.6"/>
    <!-- Right hemisphere -->
    <path d="M5,-45 C30,-40 48,-20 48,5 C48,25 35,42 15,45" fill="none" stroke="url(#brainGrad)" stroke-width="2" opacity="0.6"/>
    <!-- Center divide -->
    <line x1="0" y1="-45" x2="0" y2="45" stroke="url(#brainGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Neural nodes -->
    <circle cx="-20" cy="-20" r="4" fill="#58a6ff" opacity="0.9"/>
    <circle cx="20" cy="-15" r="3.5" fill="#bc8cff" opacity="0.9"/>
    <circle cx="-15" cy="10" r="3" fill="#f778ba" opacity="0.9"/>
    <circle cx="25" cy="15" r="4" fill="#56d4dd" opacity="0.9"/>
    <circle cx="0" cy="-5" r="3.5" fill="#58a6ff" opacity="0.9"/>
    <circle cx="-30" cy="5" r="2.5" fill="#3fb950" opacity="0.9"/>
    <circle cx="35" cy="-5" r="2.5" fill="#d29922" opacity="0.9"/>
    <circle cx="10" cy="30" r="3" fill="#bc8cff" opacity="0.9"/>
    <circle cx="-25" cy="-35" r="2.5" fill="#56d4dd" opacity="0.8"/>
    <circle cx="30" cy="30" r="2.5" fill="#3fb950" opacity="0.8"/>

    <!-- Neural connections -->
    <line x1="-20" y1="-20" x2="0" y2="-5" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="-15" x2="0" y2="-5" stroke="#bc8cff" stroke-width="1" opacity="0.5"/>
    <line x1="-15" y1="10" x2="0" y2="-5" stroke="#f778ba" stroke-width="1" opacity="0.5"/>
    <line x1="25" y1="15" x2="0" y2="-5" stroke="#56d4dd" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="-20" x2="-15" y2="10" stroke="#58a6ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="-15" x2="25" y2="15" stroke="#bc8cff" stroke-width="0.8" opacity="0.3"/>
    <line x1="-30" y1="5" x2="-20" y2="-20" stroke="#3fb950" stroke-width="0.8" opacity="0.3"/>
    <line x1="35" y1="-5" x2="20" y2="-15" stroke="#d29922" stroke-width="0.8" opacity="0.3"/>
    <line x1="10" y1="30" x2="25" y2="15" stroke="#bc8cff" stroke-width="0.8" opacity="0.3"/>
    <line x1="-25" y1="-35" x2="-20" y2="-20" stroke="#56d4dd" stroke-width="0.8" opacity="0.3"/>
    <line x1="30" y1="30" x2="25" y2="15" stroke="#3fb950" stroke-width="0.8" opacity="0.3"/>
    <line x1="-15" y1="10" x2="10" y2="30" stroke="#f778ba" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="180" y="145" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#f0f6fc" letter-spacing="-1">
    OpenMind
  </text>

  <!-- Tagline -->
  <text x="180" y="185" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" letter-spacing="0.3">
    Free ChatGPT + Claude + Gemini. Run locally. No GPU needed.
  </text>

  <!-- Badges -->
  <g transform="translate(180, 220)">
    <!-- Free Forever -->
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#238636" opacity="0.2" stroke="#3fb950" stroke-width="1"/>
    <text x="55" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#3fb950" text-anchor="middle">Free Forever</text>

    <!-- 100% Private -->
    <rect x="125" y="0" width="120" height="32" rx="16" fill="#58a6ff" opacity="0.1" stroke="#58a6ff" stroke-width="1"/>
    <text x="185" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#58a6ff" text-anchor="middle">100% Private</text>

    <!-- No GPU -->
    <rect x="260" y="0" width="90" height="32" rx="16" fill="#bc8cff" opacity="0.1" stroke="#bc8cff" stroke-width="1"/>
    <text x="305" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#bc8cff" text-anchor="middle">No GPU</text>

    <!-- One Click -->
    <rect x="365" y="0" width="105" height="32" rx="16" fill="#d29922" opacity="0.1" stroke="#d29922" stroke-width="1"/>
    <text x="417" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#d29922" text-anchor="middle">One Click</text>

    <!-- Open Source -->
    <rect x="485" y="0" width="115" height="32" rx="16" fill="#56d4dd" opacity="0.1" stroke="#56d4dd" stroke-width="1"/>
    <text x="542" y="21" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#56d4dd" text-anchor="middle">Open Source</text>
  </g>

  <!-- Install command hint -->
  <g transform="translate(180, 290)">
    <rect x="0" y="0" width="420" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="15" y="27" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#3fb950">$</text>
    <text x="30" y="27" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#c9d1d9"> pip install openmind &amp;&amp; openmind</text>
    <!-- Copy button -->
    <rect x="375" y="8" width="32" height="26" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="391" y="26" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Copy</text>
  </g>

  <!-- Stars / social proof -->
  <g transform="translate(180, 350)">
    <text font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#8b949e">
      <tspan x="0" dy="0">&#9733; 12.4k stars</tspan>
      <tspan x="120" dy="0">&#128101; 1.2k forks</tspan>
      <tspan x="240" dy="0">&#128640; v2.1.0</tspan>
    </text>
  </g>

  <!-- Decorative corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#58a6ff" stroke-width="2" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#58a6ff" stroke-width="2" opacity="0.3"/>
  <line x1="780" y1="380" x2="740" y2="380" stroke="#bc8cff" stroke-width="2" opacity="0.3"/>
  <line x1="780" y1="380" x2="780" y2="340" stroke="#bc8cff" stroke-width="2" opacity="0.3"/>
</svg>