<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#bc8cff"/>
      <stop offset="100%" style="stop-color:#f778ba"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Neural network connections -->
  <g filter="url(#softglow)" opacity="0.3">
    <circle cx="400" cy="170" r="50" fill="none" stroke="url(#brain)" stroke-width="1.5"/>
    <circle cx="400" cy="170" r="80" fill="none" stroke="url(#brain)" stroke-width="0.8"/>
    <circle cx="400" cy="170" r="110" fill="none" stroke="url(#brain)" stroke-width="0.4"/>
    <line x1="350" y1="130" x2="250" y2="80" stroke="#58a6ff" stroke-width="1"/>
    <line x1="450" y1="130" x2="550" y2="80" stroke="#bc8cff" stroke-width="1"/>
    <line x1="350" y1="210" x2="250" y2="260" stroke="#f778ba" stroke-width="1"/>
    <line x1="450" y1="210" x2="550" y2="260" stroke="#58a6ff" stroke-width="1"/>
    <line x1="300" y1="170" x2="200" y2="170" stroke="#bc8cff" stroke-width="0.8"/>
    <line x1="500" y1="170" x2="600" y2="170" stroke="#f778ba" stroke-width="0.8"/>
    <circle cx="250" cy="80" r="4" fill="#58a6ff"/>
    <circle cx="550" cy="80" r="4" fill="#bc8cff"/>
    <circle cx="250" cy="260" r="4" fill="#f778ba"/>
    <circle cx="550" cy="260" r="4" fill="#58a6ff"/>
    <circle cx="200" cy="170" r="3" fill="#bc8cff"/>
    <circle cx="600" cy="170" r="3" fill="#f778ba"/>
  </g>

  <!-- Brain icon -->
  <g filter="url(#glow)" transform="translate(400,170)">
    <circle r="40" fill="none" stroke="url(#brain)" stroke-width="2.5"/>
    <path d="M-15,-20 Q-5,-30 5,-20 Q15,-10 10,0 Q15,10 5,20 Q-5,30 -15,20 Q-25,10 -20,0 Q-25,-10 -15,-20Z" fill="none" stroke="url(#brain)" stroke-width="2"/>
    <line x1="-5" y1="-15" x2="-5" y2="15" stroke="url(#brain)" stroke-width="1.5"/>
    <line x1="-15" y1="0" x2="10" y2="0" stroke="url(#brain)" stroke-width="1.5"/>
    <circle r="3" fill="#58a6ff"/>
  </g>

  <!-- Title -->
  <text x="400" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="2">🧠 LocalMind</text>

  <!-- Tagline -->
  <text x="400" y="325" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#8b949e" letter-spacing="1">Your Private AI Operating System</text>

  <!-- Badges row -->
  <g transform="translate(400, 365)" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12">
    <rect x="-250" y="-12" width="80" height="24" rx="12" fill="#238636" opacity="0.8"/>
    <text x="-210" y="4" fill="white" font-size="11">Open Source</text>
    <rect x="-155" y="-12" width="70" height="24" rx="12" fill="#1f6feb" opacity="0.8"/>
    <text x="-120" y="4" fill="white" font-size="11">Privacy First</text>
    <rect x="-70" y="-12" width="60" height="24" rx="12" fill="#8957e5" opacity="0.8"/>
    <text x="-40" y="4" fill="white" font-size="11">AI Agents</text>
    <rect x="5" y="-12" width="55" height="24" rx="12" fill="#da3633" opacity="0.8"/>
    <text x="32" y="4" fill="white" font-size="11">RAG</text>
    <rect x="75" y="-12" width="70" height="24" rx="12" fill="#f0883e" opacity="0.8"/>
    <text x="110" y="4" fill="white" font-size="11">Plugins</text>
    <rect x="160" y="-12" width="80" height="24" rx="12" fill="#3fb950" opacity="0.8"/>
    <text x="200" y="4" fill="white" font-size="11">Workflows</text>
  </g>
</svg>