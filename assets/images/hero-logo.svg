<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse { 0%,100%{opacity:0.4;r:3} 50%{opacity:1;r:5} }
    @keyframes pulseRing { 0%{r:8;opacity:0.6} 100%{r:20;opacity:0} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes dash { to{stroke-dashoffset:0} }
    .node{animation:pulse 3s ease-in-out infinite}
    .ring{animation:pulseRing 2s ease-out infinite}
    .circuit{stroke:#6366f1;stroke-width:1;fill:none;opacity:0.3;stroke-dasharray:200;animation:dash 3s linear infinite}
    .circuit2{stroke:#8b5cf6;stroke-width:1;fill:none;opacity:0.25;stroke-dasharray:150;animation:dash 4s linear infinite}
    .circuit3{stroke:#a855f7;stroke-width:0.8;fill:none;opacity:0.2;stroke-dasharray:180;animation:dash 3.5s linear infinite}
  </style>
  <rect width="800" height="400" fill="#0f0f23" rx="12"/>
  <!-- Background circuit network -->
  <g opacity="0.5">
    <!-- Horizontal lines -->
    <line x1="50" y1="80" x2="750" y2="80" class="circuit"/>
    <line x1="30" y1="150" x2="770" y2="150" class="circuit2"/>
    <line x1="60" y1="250" x2="740" y2="250" class="circuit3"/>
    <line x1="40" y1="320" x2="760" y2="320" class="circuit"/>
    <!-- Vertical lines -->
    <line x1="120" y1="30" x2="120" y2="370" class="circuit2"/>
    <line x1="280" y1="20" x2="280" y2="380" class="circuit3"/>
    <line x1="520" y1="30" x2="520" y2="370" class="circuit"/>
    <line x1="680" y1="20" x2="680" y2="380" class="circuit2"/>
    <!-- Diagonal connections -->
    <line x1="120" y1="80" x2="280" y2="150" class="circuit3"/>
    <line x1="280" y1="150" x2="520" y2="80" class="circuit"/>
    <line x1="520" y1="250" x2="680" y2="320" class="circuit2"/>
    <line x1="120" y1="250" x2="280" y2="320" class="circuit"/>
    <line x1="280" y1="80" x2="520" y2="150" class="circuit3"/>
    <line x1="520" y1="150" x2="680" y2="80" class="circuit2"/>
    <line x1="120" y1="320" x2="280" y2="250" class="circuit"/>
    <line x1="680" y1="150" x2="520" y2="250" class="circuit3"/>
  </g>
  <!-- Glowing nodes at intersections -->
  <g filter="url(#glow)">
    <circle cx="120" cy="80" r="3" fill="#6366f1" class="node"/>
    <circle cx="280" cy="80" r="3" fill="#7c3aed" class="node" style="animation-delay:0.5s"/>
    <circle cx="520" cy="80" r="3" fill="#8b5cf6" class="node" style="animation-delay:1s"/>
    <circle cx="680" cy="80" r="3" fill="#a855f7" class="node" style="animation-delay:1.5s"/>
    <circle cx="120" cy="150" r="3" fill="#8b5cf6" class="node" style="animation-delay:0.3s"/>
    <circle cx="280" cy="150" r="3" fill="#6366f1" class="node" style="animation-delay:0.8s"/>
    <circle cx="520" cy="150" r="3" fill="#a855f7" class="node" style="animation-delay:1.3s"/>
    <circle cx="680" cy="150" r="3" fill="#7c3aed" class="node" style="animation-delay:1.8s"/>
    <circle cx="120" cy="250" r="3" fill="#a855f7" class="node" style="animation-delay:0.6s"/>
    <circle cx="280" cy="250" r="3" fill="#6366f1" class="node" style="animation-delay:1.1s"/>
    <circle cx="520" cy="250" r="3" fill="#8b5cf6" class="node" style="animation-delay:1.6s"/>
    <circle cx="680" cy="250" r="3" fill="#6366f1" class="node" style="animation-delay:2.1s"/>
    <circle cx="120" cy="320" r="3" fill="#7c3aed" class="node" style="animation-delay:0.9s"/>
    <circle cx="280" cy="320" r="3" fill="#a855f7" class="node" style="animation-delay:1.4s"/>
    <circle cx="520" cy="320" r="3" fill="#6366f1" class="node" style="animation-delay:1.9s"/>
    <circle cx="680" cy="320" r="3" fill="#8b5cf6" class="node" style="animation-delay:2.4s"/>
  </g>
  <!-- Pulse rings on key nodes -->
  <circle cx="400" cy="200" r="8" fill="none" stroke="#8b5cf6" stroke-width="1" class="ring"/>
  <circle cx="400" cy="200" r="8" fill="none" stroke="#a855f7" stroke-width="1" class="ring" style="animation-delay:1s"/>
  <!-- Central brain glow -->
  <circle cx="400" cy="200" r="60" fill="url(#glowGrad)" opacity="0.15" filter="url(#softGlow)"/>
  <!-- Main text -->
  <text x="400" y="175" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="url(#mainGrad)" filter="url(#glow)">NexusMind</text>
  <!-- Subtitle -->
  <text x="400" y="225" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="18" fill="#c4b5fd" opacity="0.9" letter-spacing="2">Your Second Brain. Always Online. Self-Evolving.</text>
  <!-- Decorative line under subtitle -->
  <line x1="250" y1="245" x2="550" y2="245" stroke="url(#mainGrad)" stroke-width="2" opacity="0.5"/>
  <!-- Version badge -->
  <rect x="345" y="260" width="110" height="28" rx="14" fill="url(#mainGrad)" opacity="0.2"/>
  <text x="400" y="279" text-anchor="middle" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="13" fill="#c4b5fd" font-weight="600">v0.1.0 Alpha</text>
</svg>