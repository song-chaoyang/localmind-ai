<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="aiBubble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes typing { 0%,100%{opacity:0.3} 50%{opacity:1} }
    .msg1{animation:fadeIn 0.5s ease-out 0.2s both}
    .msg2{animation:fadeIn 0.5s ease-out 0.8s both}
    .msg3{animation:fadeIn 0.5s ease-out 1.4s both}
    .msg4{animation:fadeIn 0.5s ease-out 2.0s both}
    .typing-dot{animation:typing 1.4s ease-in-out infinite}
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}
  </style>
  <rect width="900" height="500" fill="#0f0f23" rx="12"/>
  <!-- Chat window frame -->
  <rect x="30" y="20" width="840" height="460" rx="12" fill="#13132b" stroke="#1e1b4b" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="30" y="20" width="840" height="44" rx="12" fill="#1a1a3e"/>
  <rect x="30" y="52" width="840" height="12" fill="#1a1a3e"/>
  <!-- Window buttons -->
  <circle cx="58" cy="42" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="80" cy="42" r="6" fill="#eab308" opacity="0.8"/>
  <circle cx="102" cy="42" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Title -->
  <text x="450" y="47" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#a5b4fc" font-weight="600">NexusMind Chat</text>
  <!-- Status indicator -->
  <circle cx="830" cy="42" r="4" fill="#22c55e"/>
  <text x="815" y="46" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">Online</text>
  <!-- User message -->
  <g class="msg1" filter="url(#shadow)">
    <rect x="60" y="85" width="780" height="50" rx="10" fill="url(#userBubble)" opacity="0.9"/>
    <text x="80" y="104" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#c4b5fd" font-weight="600">You</text>
    <text x="80" y="124" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#e0e7ff">Review my PR #42 and check for security issues</text>
  </g>
  <!-- AI response -->
  <g class="msg2" filter="url(#shadow)">
    <rect x="60" y="150" width="780" height="130" rx="10" fill="url(#aiBubble)" stroke="#312e81" stroke-width="1"/>
    <text x="80" y="170" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#a78bfa" font-weight="600">NexusMind</text>
    <text x="80" y="192" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#c4b5fd">I found 3 security issues:</text>
    <text x="80" y="212" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#f87171">1) SQL injection in auth.py line 45</text>
    <text x="80" y="232" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#fbbf24">2) Missing input validation on /api/users</text>
    <text x="80" y="252" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="#f87171">3) Hardcoded API key in config.py:18</text>
    <text x="80" y="272" font-family="'SF Mono','Fira Code',monospace" font-size="11" fill="#6b7280">Suggested fixes applied to PR comments.</text>
  </g>
  <!-- Memory indicator -->
  <g class="msg3">
    <rect x="60" y="295" width="780" height="36" rx="8" fill="#1e1b4b" opacity="0.6" stroke="#4338ca" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="80" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#818cf8">&#x1F9E0; Remembered: Project uses PostgreSQL, Python 3.12, FastAPI</text>
  </g>
  <!-- Skill indicator -->
  <g class="msg4">
    <rect x="60" y="342" width="780" height="36" rx="8" fill="#1e1b4b" opacity="0.6" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="80" y="365" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#c084fc">&#x26A1; Applied skill: Security Review (used 23 times)</text>
  </g>
  <!-- Input bar -->
  <rect x="60" y="400" width="700" height="40" rx="10" fill="#1a1a3e" stroke="#312e81" stroke-width="1"/>
  <text x="80" y="425" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#4b5563">Type a message...</text>
  <!-- Send button -->
  <rect x="775" y="400" width="65" height="40" rx="10" fill="url(#chatGrad)"/>
  <text x="807" y="425" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="white" font-weight="600">Send</text>
  <!-- Typing indicator dots -->
  <g transform="translate(80, 450)">
    <circle cx="0" cy="0" r="3" fill="#8b5cf6" class="typing-dot"/>
    <circle cx="12" cy="0" r="3" fill="#8b5cf6" class="typing-dot"/>
    <circle cx="24" cy="0" r="3" fill="#8b5cf6" class="typing-dot"/>
  </g>
  <text x="116" y="454" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#6b7280">NexusMind is thinking...</text>
</svg>